    <style>
        :root {
            --bg-deep: #020617;
            --accent-orange: #fb923c;
            --accent-yellow: #facc15;
            --card-bg: #1e293b;
            --glass-orange: rgba(251, 146, 60, 0.1);
            --glass-border: rgba(251, 146, 60, 0.3);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                linear-gradient(to bottom, rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 1)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .futuristic-title {
            font-family: 'Assistant', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(251, 146, 60, 0.5);
            border-bottom: 2px solid var(--accent-orange);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        /* Search Input Styling */
        .search-container {
            position: relative;
            max-width: 300px;
            margin: 1.5rem auto;
        }

        .search-input {
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 10px 40px 10px 15px;
            color: white;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent-yellow);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
            background: rgba(30, 41, 59, 0.9);
        }

        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-orange);
            pointer-events: none;
        }

        /* 3D Futuristic Card */
        .card-3d {
            background: var(--card-bg);
            border-radius: 4px;
            border: 1px solid var(--glass-border);
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .card-3d::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-yellow), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .card-3d:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(251, 146, 60, 0.25);
            border-color: var(--accent-yellow);
            background: #2d3748;
        }

        .card-3d:hover::before {
            transform: translateX(100%);
        }

        /* Glass Buttons */
        .glass-btn {
            background: var(--glass-orange);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--accent-yellow);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .glass-btn:hover {
            background: rgba(251, 146, 60, 0.2);
            box-shadow: 0 0 15px rgba(251, 146, 60, 0.3);
            color: white;
        }

        .glass-btn:active {
            background: rgba(251, 146, 60, 0.4);
            transform: scale(0.96);
            backdrop-filter: blur(20px);
        }

        /* Filter Buttons with Shimmer */
        .filter-btn {
            padding: 10px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border-width: 1px;
            position: relative;
            overflow: hidden;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .filter-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 150%; 
            width: 60px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-20deg);
            transition: 0s;
        }

        .filter-btn:hover::after {
            left: -150%; 
            transition: left 0.6s ease-in-out;
        }

        /* Modal Styles */
        .modal-overlay {
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            padding: 2.5rem;
            border: 2px solid var(--accent-orange);
            box-shadow: 0 0 50px rgba(251, 146, 60, 0.2);
            position: relative;
            animation: emerge 0.3s ease-out;
        }

        @keyframes emerge {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .category-chip {
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            margin-bottom: 1rem;
            display: inline-block;
            border-radius: 4px;
            border-right-width: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        footer {
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

                hover: 'hover:bg-rose-900/60 hover:text-rose-400 hover:border-rose-400'
            },
            'משחוק': {
                base: 'bg-orange-900/30 text-orange-400 border-orange-500/50',
                active: 'bg-indigo-500 text-black border-indigo-400 shadow-[0_0_15px_rgba(99,102,241,0.5)]',
                hover: 'hover:bg-indigo-900/60 hover:text-indigo-400 hover:border-indigo-400'
            },
            'כלים שעושים חיים קלים': {
                base: 'bg-orange-900/30 text-orange-400 border-orange-500/50',
                active: 'bg-amber-500 text-black border-amber-400 shadow-[0_0_15px_rgba(245,158,11,0.5)]',
                hover: 'hover:bg-amber-900/60 hover:text-amber-400 hover:border-amber-400'
            },
            'מאגרי מדיה': {
                base: 'bg-orange-900/30 text-orange-400 border-orange-500/50',
                active: 'bg-fuchsia-500 text-black border-fuchsia-400 shadow-[0_0_15px_rgba(217,70,239,0.5)]',
                hover: 'hover:bg-fuchsia-900/60 hover:text-fuchsia-400 hover:border-fuchsia-400'
            },
            'הכל': {
                base: 'bg-slate-700/40 text-slate-300 border-slate-500',
                active: 'bg-slate-200 text-black border-white shadow-[0_0_15px_rgba(255,255,255,0.3)]',
                hover: 'hover:bg-slate-700/60 hover:border-slate-300'
            },
            'default': {
                base: 'bg-orange-900/30 text-orange-400 border-orange-500/50',
                active: 'bg-orange-500 text-black border-orange-400 shadow-[0_0_15px_rgba(251,146,60,0.5)]',
                hover: 'hover:bg-orange-900/60 hover:text-orange-400 hover:border-orange-400'
            }
        };

        function getCategoryStyle(category, isActive = false, isFilterBtn = true) {
            const style = categoryStyles[category] || categoryStyles['default'];
            if (!isFilterBtn) return style.active.split('shadow')[0].replace('text-black', ''); 
            return isActive ? style.active : `${style.base} ${style.hover}`;
        }

        function getCategoryCount(category) {
            if (category === 'הכל') return presentations.length;
            return presentations.filter(p => p.category === category).length;
        }

        function renderFilters() {
            const categories = ['הכל', ...new Set(presentations.map(p => p.category))];
            filterBar.innerHTML = categories.map(cat => {
                const isActive = activeCategory === cat;
                const count = getCategoryCount(cat);
                return `<button onclick="setFilter('${cat}')" class="filter-btn w-full md:w-auto ${getCategoryStyle(cat, isActive, true)}">
                    ${cat} <span class="mr-1 opacity-60 text-[0.7rem]">(${count})</span>
                </button>`;
            }).join('');
        }

        function setFilter(category) {
            activeCategory = category;
            renderFilters();
            renderPresentations();
        }

        function handleSearch() {
            searchQuery = searchInput.value.toLowerCase().trim();
            renderPresentations();
        }

        function renderPresentations() {
            let filteredData = activeCategory === 'הכל' ? presentations : presentations.filter(p => p.category === activeCategory);
            
            if (searchQuery) {
                filteredData = filteredData.filter(p => 
                    p.title.toLowerCase().includes(searchQuery) || 
                    p.description.toLowerCase().includes(searchQuery)
                );
            }

            if (filteredData.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-500">לא נמצאו כלים התואמים את החיפוש...</div>`;
                return;
            }

            grid.innerHTML = filteredData.map(p => `
                <div class="card-3d p-8 flex flex-col justify-between">
                    <div>
                        <div class="category-chip ${getCategoryStyle(p.category, true, false)}">${p.category}</div>
                        <h3 class="text-2xl font-bold mb-4 text-white">${p.title}</h3>
                        <p class="text-white text-base mb-10 leading-relaxed">${p.description}</p>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="openModal(${p.id})" class="glass-btn py-3 px-2 rounded font-bold text-[10px] md:text-xs text-center">מידע ושימושים</button>
                            <a href="${p.siteUrl}" target="_blank" class="glass-btn py-3 px-2 rounded font-bold text-[10px] md:text-xs text-center flex items-center justify-center">כניסה לאתר</a>
                        </div>
                        ${p.guideUrl ? `<a href="${p.guideUrl}" target="_blank" class="glass-btn py-3 px-4 rounded text-center text-xs transition-all font-bold tracking-wider border-orange-500/50 text-orange-400 hover:bg-orange-500/20">מדריך לקבלת חשבון חינוך</a>` : ''}
                        
                        ${p.driveUrl && p.driveUrl !== '#' && p.driveUrl !== '' ? `
                        <a href="${p.driveUrl}" target="_blank" class="bg-orange-500 hover:bg-yellow-500 text-black py-3 px-4 rounded text-center text-xs transition-all font-black uppercase tracking-wider shadow-[0_0_15px_rgba(249,115,22,0.4)]">צפייה במצגת ההדרכה</a>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = presentations.find(item => item.id === id);
            document.getElementById('modalBody').innerText = p.info;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('infoModal')) closeModal(); }

        renderFilters();
        renderPresentations();
    </script>
</body>
</html>
