<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה לארגז הכלים - אורט שחקים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-orange: #fb923c;
            --accent-yellow: #facc15;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, rgba(251, 146, 60, 0.05) 0%, transparent 80%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid rgba(251, 146, 60, 0.3);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 8px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }

        .input-label {
            display: block;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .main-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(251, 146, 60, 0.3);
            color: white;
            padding: 12px 16px;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s;
        }

        .main-input:focus {
            border-color: var(--accent-orange);
            background: rgba(15, 23, 42, 0.9);
        }

        .enter-btn {
            background: var(--accent-orange);
            color: white;
            font-weight: bold;
            padding: 14px 24px;
            border-radius: 4px;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        .enter-btn:hover:not(:disabled) {
            background: #f97316;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 146, 60, 0.3);
        }

        .enter-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .admin-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(251, 146, 60, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            width: 120px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }

        .loading-spinner {
            border: 3px solid rgba(251, 146, 60, 0.1);
            border-top: 3px solid var(--accent-orange);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }

        #welcomeOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="text-3xl font-bold mb-2 text-white uppercase italic tracking-wider">שחקים TOOLBOX</h1>
        <p class="text-slate-400 mb-8">זיהוי משתמש ארגוני</p>
        
        <div id="errorMessage" class="error-box text-right"></div>

        <div class="input-group">
            <label class="input-label">מהו שמך?</label>
            <input type="text" id="userName" class="main-input" placeholder="הכנס שם מלא">
        </div>

        <div class="input-group">
            <label class="input-label">מהו הדומיין של החשבון הארגוני של בית הספר?</label>
            <input type="text" id="domainAnswer" class="main-input" placeholder="לדוגמה: domain.com">
        </div>

        <button id="submitBtn" class="enter-btn">כניסה למערכת</button>

        <div class="admin-section">
            <p class="text-xs text-slate-500 mb-3">כניסת מנהל (מעקף קוד)</p>
            <div class="flex gap-2 justify-center items-center">
                <input type="password" id="adminCode" class="admin-input" placeholder="קוד">
                <button id="adminLoginBtn" class="bg-orange-600/20 hover:bg-orange-600 text-orange-400 hover:text-white border border-orange-600/50 px-4 py-2 rounded text-sm transition-all">כניסה</button>
            </div>
        </div>

        <div class="mt-4 flex justify-center">
            <div id="loader" class="loading-spinner"></div>
        </div>
    </div>

    <div id="welcomeOverlay">
        <h2 id="welcomeName" class="text-4xl font-bold text-white mb-4">שלום</h2>
        <p class="text-orange-400 text-xl">מיד תועבר לארגז הכלים...</p>
        <div class="mt-8 loading-spinner" style="display: block;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuo4N-w-5JFu2pLwmNmPrnuB56q0-9Ikc",
            authDomain: "pedagogical-tools.firebaseapp.com",
            projectId: "pedagogical-tools",
            storageBucket: "pedagogical-tools.firebasestorage.app",
            messagingSenderId: "439078826304",
            appId: "1:439078826304:web:182cbafb97abab137a4aa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "pedagogical-tools";
        const CORRECT_DOMAIN = "sn.ort.org.il";

        const submitBtn = document.getElementById('submitBtn');
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        const adminCodeInput = document.getElementById('adminCode');
        const userNameInput = document.getElementById('userName');
        const domainInput = document.getElementById('domainAnswer');
        const errorMessage = document.getElementById('errorMessage');
        const loader = document.getElementById('loader');
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const welcomeName = document.getElementById('welcomeName');

        const initAuth = async () => {
            try { await signInAnonymously(auth); } catch (err) { console.error("Auth init failed", err); }
        };
        initAuth();

        adminLoginBtn.addEventListener('click', async () => {
            if (adminCodeInput.value === '1234') {
                loader.style.display = 'block';
                await logVisit("מנהל מערכת", "Admin Bypass");
                showGreeting("מנהל מערכת");
            } else {
                showError("קוד שגוי. נסה שוב.");
            }
        });

        async function logVisit(name, method) {
            if (!auth.currentUser) return;
            try {
                const logRef = collection(db, 'artifacts', appId, 'public', 'data', 'user_logins');
                await addDoc(logRef, {
                    name: name,
                    method: method,
                    timestamp: serverTimestamp(),
                    uid: auth.currentUser.uid
                });
            } catch (e) { console.error("Firestore Logging Failed:", e); }
        }

        function showGreeting(name) {
            welcomeName.innerText = `שלום ${name}`;
            welcomeOverlay.style.display = 'flex';
            setTimeout(() => {
                window.location.href = 'dashboard.html'; // מעבר לקובץ המאגר המעודכן
            }, 2000);
        }

        async function handleSubmit() {
            errorMessage.style.display = 'none';
            const name = userNameInput.value.trim();
            const answer = domainInput.value.trim().toLowerCase();
            if (!name) { showError("אנא הכנס את שמך."); return; }
            if (answer !== CORRECT_DOMAIN) { showError("הדומיין שהוזן אינו נכון. אנא נסה שוב."); return; }
            loader.style.display = 'block';
            submitBtn.disabled = true;
            await logVisit(name, "Domain Question");
            showGreeting(name);
        }

        function showError(msg) {
            errorMessage.innerHTML = msg;
            errorMessage.style.display = 'block';
        }
        submitBtn.addEventListener('click', handleSubmit);
    </script>
</body>
</html>
