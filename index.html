<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה לארגז הכלים - אורט שחקים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-orange: #fb923c;
            --card-bg: #1e293b;
            --radius-round: 24px;
            --radius-soft-square: 6px;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, rgba(251, 146, 60, 0.05) 0%, transparent 80%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid rgba(251, 146, 60, 0.3);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 12px;
            text-align: center;
        }

        .input-group { margin-bottom: 1.25rem; text-align: right; }
        .input-label { display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: bold; }

        .main-input, .main-select {
            width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(251, 146, 60, 0.3);
            color: white; padding: 12px; border-radius: 8px; outline: none; transition: all 0.3s;
        }

        .main-input:focus, .main-select:focus { border-color: var(--accent-orange); background: rgba(15, 23, 42, 0.9); }

        .enter-btn {
            background: var(--accent-orange); color: white; font-weight: bold; padding: 14px; width: 100%;
            margin-top: 1rem; cursor: pointer; transition: all 0.3s;
            border-radius: var(--radius-round) var(--radius-soft-square) var(--radius-round) var(--radius-soft-square) !important;
        }

        .enter-btn:hover:not(:disabled) { background: #f97316; transform: translateY(-2px); }
        .enter-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; padding: 0.75rem; border-radius: 4px; margin-bottom: 1.5rem; display: none; font-size: 0.85rem; }

        #welcomeOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }

        .spinner { border: 3px solid rgba(251, 146, 60, 0.1); border-top: 3px solid var(--accent-orange); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card" id="loginForm">
        <h1 class="text-3xl font-bold mb-2 text-white uppercase italic tracking-wider">שחקים TOOLBOX</h1>
        <p class="text-slate-400 mb-8">זיהוי משתמש ארגוני</p>
        
        <div id="errorMessage" class="error-box text-right"></div>

        <div class="grid grid-cols-2 gap-4">
            <div class="input-group">
                <label class="input-label">שם פרטי</label>
                <input type="text" id="firstName" class="main-input">
            </div>
            <div class="input-group">
                <label class="input-label">שם משפחה</label>
                <input type="text" id="lastName" class="main-input">
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">תפקיד</label>
            <select id="userRole" class="main-select">
                <option value="" disabled selected>בחר תפקיד...</option>
                <option value="מורה מקצועי/ת">מורה מקצועי/ת</option>
                <option value="מחנך/ת">מחנך/ת</option>
                <option value="מנהל/ת">מנהל/ת</option>
                <option value="סייעת">סייעת</option>
            </select>
        </div>

        <div class="input-group">
            <label class="input-label">כתובת מייל ארגונית</label>
            <input type="email" id="emailInput" class="main-input" placeholder="user@sn.ort.org.il">
            <p class="text-[10px] text-slate-500 mt-1">הכניסה מותרת לבעלי דומיין sn.ort.org.il בלבד</p>
        </div>

        <button id="submitBtn" class="enter-btn">כניסה למערכת</button>

        <div class="mt-8 pt-6 border-t border-white/10 flex gap-2 justify-center items-center">
            <input type="password" id="adminCode" class="w-24 bg-slate-800 border border-white/10 rounded p-2 text-center text-sm text-white outline-none" placeholder="קוד מנהל">
            <button id="adminBtn" class="bg-orange-600/20 hover:bg-orange-600 text-orange-400 hover:text-white px-4 py-2 rounded text-xs transition-all">כניסה</button>
        </div>
    </div>

    <div id="welcomeOverlay">
        <h2 id="welcomeName" class="text-4xl font-bold text-white mb-4 text-center">שלום</h2>
        <p class="text-orange-400 text-xl mb-8">מיד תועבר לארגז הכלים...</p>
        <div class="spinner"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuo4N-w-5JFu2pLwmNmPrnuB56q0-9Ikc",
            authDomain: "pedagogical-tools.firebaseapp.com",
            projectId: "pedagogical-tools",
            storageBucket: "pedagogical-tools.firebasestorage.app",
            messagingSenderId: "439078826304",
            appId: "1:439078826304:web:182cbafb97abab137a4aa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "pedagogical-tools";
        const CORRECT_DOMAIN = "sn.ort.org.il";

        const submitBtn = document.getElementById('submitBtn');
        const adminBtn = document.getElementById('adminBtn');
        const errorMessage = document.getElementById('errorMessage');
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const welcomeName = document.getElementById('welcomeName');

        signInAnonymously(auth).catch(err => console.error("Firebase Error", err));

        function showError(msg) {
            errorMessage.innerText = msg;
            errorMessage.style.display = 'block';
            submitBtn.disabled = false;
        }

        async function doLogin(fName, lName, role, method) {
            // 1. קביעת מועד תפוגה לעוד 10 דקות (במילישניות)
            const expiryTime = Date.now() + (10 * 60 * 1000);
            
            // 2. שמירת הנתונים ב-sessionStorage
            sessionStorage.setItem('toolbox_auth_expiry', expiryTime.toString());
            sessionStorage.setItem('toolbox_authorized', 'true');
            
            welcomeName.innerText = `שלום ${fName}`;
            welcomeOverlay.style.display = 'flex';

            try {
                const logRef = collection(db, 'artifacts', appId, 'public', 'data', 'user_logins');
                await addDoc(logRef, {
                    firstName: fName, lastName: lName, role: role, method: method, timestamp: serverTimestamp()
                });
            } catch (e) { console.error("Logging failed", e); }

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1800);
        }

        submitBtn.addEventListener('click', () => {
            const fName = document.getElementById('firstName').value.trim();
            const lName = document.getElementById('lastName').value.trim();
            const role = document.getElementById('userRole').value;
            const email = document.getElementById('emailInput').value.trim().toLowerCase();

            if (!fName || !lName) return showError("אנא הכנס שם מלא.");
            if (!role) return showError("אנא בחר תפקיד.");
            if (!email.includes('@')) return showError("אנא הכנס כתובת מייל תקינה.");

            const domain = email.split('@')[1];
            if (domain !== CORRECT_DOMAIN) {
                return showError("הגישה מותרת רק למייל של אורט שחקים (sn.ort.org.il).");
            } 

            submitBtn.disabled = true;
            doLogin(fName, lName, role, "Email Validation");
        });

        adminBtn.addEventListener('click', () => {
            const code = document.getElementById('adminCode').value;
            if (code === '1234') {
                doLogin("מנהל", "מערכת", "מנהל/ת", "Admin Access");
            } else {
                alert("קוד שגוי");
            }
        });
    </script>
</body>
</html>
