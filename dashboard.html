<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ארגז הכלים של שחקים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-blue: #3b82f6; 
            --accent-light: #93c5fd; 
            --card-gradient-center: rgba(15, 23, 42, 0.9); 
            --card-gradient-edge: rgba(59, 130, 246, 0.4);
            --glass-blue: rgba(59, 130, 246, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --radius-round: 24px;
            --radius-soft-square: 6px;
            --category-bg: #000000;
            --category-text: #fef9c3; 
            --accent-orange: #f97316; 
            --accent-yellow: #facc15; 
            --light-orange: #fdba74; 
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-deep);
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 1)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .futuristic-title {
            font-family: 'Assistant', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            border-bottom: 2px solid var(--accent-blue);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .search-container {
            position: relative;
            max-width: 350px;
            margin: 1.5rem auto;
        }

        .search-input {
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 9999px;
            padding: 12px 45px 12px 20px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent-light);
            box-shadow: 0 0 15px rgba(147, 197, 253, 0.2);
            background: rgba(30, 41, 59, 0.9);
        }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-blue);
            pointer-events: none;
        }

        .card-3d {
            background: radial-gradient(circle, var(--card-gradient-center) 0%, var(--card-gradient-edge) 100%);
            backdrop-filter: blur(14px); 
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            --category-color: var(--accent-blue);
            --category-glow: rgba(59, 130, 246, 0.25);
        }

        .card-3d::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--category-color), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .card-3d:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px var(--category-glow);
            border-color: var(--category-color);
            filter: brightness(1.1);
        }

        .card-3d:hover::before { transform: translateX(100%); }

        /* Diagonal Rounded Button Style */
        .yellow-action-btn {
            background-color: var(--accent-yellow);
            color: #000;
            font-weight: 800;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: var(--radius-round) var(--radius-soft-square) var(--radius-round) var(--radius-soft-square) !important;
        }

        .yellow-action-btn:hover {
            background-color: #eab308; 
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.5);
            transform: translateY(-1px);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: var(--radius-round) var(--radius-soft-square) var(--radius-round) var(--radius-soft-square) !important;
        }

        .glass-btn:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            color: white;
        }

        .filter-btn {
            background-color: var(--category-bg);
            color: var(--category-text);
            padding: 10px 22px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            --hover-color: var(--accent-blue);
            border-radius: var(--radius-round) var(--radius-soft-square) var(--radius-round) var(--radius-soft-square) !important;
        }

        .filter-btn.active-filter {
            box-shadow: 0 0 15px var(--hover-color);
            border-color: var(--hover-color);
            background-color: #111;
        }

        /* Mobile Dropdown Styling */
        #mobileFilterContainer { position: relative; display: none; margin-bottom: 1.5rem; }
        @media (max-width: 768px) { #mobileFilterContainer { display: block; } #desktopFilterBar { display: none; } }

        .mobile-dropdown-btn {
            width: 100%;
            background: black;
            border: 2px solid var(--accent-blue);
            color: var(--category-text);
            padding: 14px 20px;
            border-radius: var(--radius-round) var(--radius-soft-square) var(--radius-round) var(--radius-soft-square);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.2);
        }

        .mobile-dropdown-list {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            z-index: 50;
            display: none;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .mobile-dropdown-item {
            padding: 14px 20px;
            color: var(--category-text);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            font-size: 0.9rem;
        }

        .mobile-dropdown-item.active { background: rgba(59, 130, 246, 0.2); color: white; }

        .total-counter {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .total-counter span {
            background: var(--accent-blue);
            color: #fff;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.75rem;
        }

        .category-num-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: white; 
            color: black;
            font-size: 0.75rem;
            font-weight: 900;
            margin-left: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .modal-overlay {
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #1e293b;
            max-width: 650px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2.5rem;
            border: 2px solid var(--accent-blue);
            border-radius: var(--radius-round) var(--radius-soft-square) var(--radius-round) var(--radius-soft-square);
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
            position: relative;
            animation: emerge 0.3s ease-out;
        }

        @keyframes emerge { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .category-chip {
            background-color: var(--category-bg);
            color: var(--category-text);
            font-size: 0.75rem;
            font-weight: bold;
            padding: 6px 14px;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            border-radius: 8px;
            border-right: 4px solid var(--accent-blue); 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        footer { margin-top: auto; border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(0, 0, 0, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-6 text-center">
        <img src="media/logo.png" alt="לוגו אורט שחקים" class="h-20 md:h-28 w-auto mx-auto mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.3)]" onerror="this.style.display='none'">
        <h1 class="text-3xl md:text-5xl font-bold mb-2 futuristic-title text-white">ארגז הכלים של שחקים</h1>
        <div class="search-container">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" cy="11" x2="16.65" cy="16.65"></line></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="חיפוש כלי..." oninput="handleSearch()">
        </div>
        
        <div id="counterContainer" class="flex justify-center">
            <div class="total-counter">
                <p>מספר הכלים במערכת:</p>
                <span id="totalToolsBadge">0</span>
            </div>
        </div>
    </header>

    <nav class="max-w-6xl mx-auto mb-10 px-2">
        <div id="desktopFilterBar" class="hidden md:flex md:flex-wrap md:gap-3 md:justify-center"></div>
        <div id="mobileFilterContainer">
            <button onclick="toggleMobileDropdown()" class="mobile-dropdown-btn">
                <span id="currentCategoryLabel">כל הקטגוריות</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <div id="mobileDropdownList" class="mobile-dropdown-list"></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 mb-16" id="presentationsGrid"></main>

    <footer class="w-full py-8 mt-12 text-center">
        <div class="max-w-6xl mx-auto px-4">
            <p class="text-slate-500 text-sm tracking-widest uppercase mb-1">המאגר נוצר ע"י <span class="text-[#3b82f6] font-bold">איתי בן טל</span></p>
            <p class="text-slate-500 text-xs tracking-widest uppercase">אורט שחקים נהריה</p>
            <div class="mt-4 w-16 h-0.5 bg-[#3b82f6] mx-auto opacity-30"></div>
        </div>
    </footer>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-content text-right">
            <span class="absolute top-4 left-4 cursor-pointer text-slate-500 hover:text-[#3b82f6] transition-opacity" onclick="closeModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </span>
            <h2 id="modalTitle" class="text-2xl font-bold mb-6 text-[#3b82f6]"></h2>
            <div id="modalBody" class="text-white leading-relaxed text-base md:text-lg whitespace-pre-line border-t border-white/10 pt-4"></div>
            <button onclick="closeModal()" class="mt-10 w-full yellow-action-btn py-4 font-bold">סגור חלון מידע</button>
        </div>
    </div>

    <script>
        const categoryMap = {
            'שיתופיות': 1,
            'אינטראקטיביות': 2,
            'עיצוב ויצירה': 3,
            'משחקים': 4,
            'כלים שעושים חיים קלים': 5,
            'מאגרי מדיה': 6,
            'כלי גוגל': 7
        };

        const presentations = [
            { id: 1, title: "Padlet", category: "שיתופיות", driveUrl: "https://drive.google.com/file/d/1EJkXEIy4E1De2FD1pdPY8Ux9jPEQIHe5/view?usp=sharing", siteUrl: "https://padlet.com", description: "לוח קיר דיגיטלי לריכוז רעיונות ותוצרים ויזואליים בזמן אמת.", info: "• ניהול סיעור מוחות כיתתי.\n• איסוף תוצרי למידה של תלמידים.\n• יצירת לוח שיתופי לתגובות ועמיתים.\n• ארגון מידע במבנה של מפה או לוח זמנים." },
            { id: 2, title: "ThingLink", category: "אינטראקטיביות", driveUrl: "https://drive.google.com/file/d/1_TS0ZEg3vJW2uPbbnO12vneIdTavgLz6/view?usp=sharing", siteUrl: "https://www.thinglink.com", description: "הפוך כל תמונה למפת למידה אינטראקטיבית עם נקודות מידע.", info: "• הוספת נקודות חמות על גבי תמונות וסרטונים.\n• יצירת סיורים וירטואליים אינטראקטיביים.\n• הכנת 'מפות ידע' לחקר עצמאי בקצב אישי." },
            { id: 34, title: "Google Keep", category: "כלי גוגל", driveUrl: "https://drive.google.com/file/d/1gZaplTezjXfM3xSXFPeqb2HUfgWT8ery/view?usp=drive_link", siteUrl: "https://keep.google.com", description: "פנקס רשימות דיגיטלי לניהול רעיונות, רשימות תיוג ותזכורות.", info: "• יצירת פתקיות צבעוניות ורשימות לניהול משימות.\n• סנכרון מלא בין הטלפון למחשב בזמן אמת.\n• שיתוף פתקים עם עמיתים לעבודה משותפת." },
            { id: 35, title: "Google Tasks", category: "כלי גוגל", driveUrl: "https://drive.google.com/file/d/1U-2v9ww4vafP6P4cDyUZ4Y2Jwdpk-GlM/view?usp=drive_link", siteUrl: "https://tasks.google.com", description: "ניהול משימות פשוט וממוקד המוטמע בתוך המייל והיומן.", info: "• יצירת רשימות 'To-Do' מהירות למעקב אחר מטלות.\n• הפיכת אימיילים למשימות בתוך Gmail.\n• הגדרת תאריכי יעד המופיעים אוטומטית ביומן גוגל." },
            { id: 36, title: "Google Sites", category: "כלי גוגל", driveUrl: "https://drive.google.com/file/d/1od4KE3XRaA_71InAjECTQnY864o-DZaK/view?usp=drive_link", siteUrl: "https://sites.google.com", description: "בניית אתרים פשוטה ואינטואיטיבית ללא צורך בכתיבת קוד.", info: "• יצירת אתרי כיתה, פורטפוליו תלמידים או מרכזי למידה.\n• ממשק גרירה והשלכה נוח במיוחד.\n• הטמעה קלה של קבצי Drive וסרטוני YouTube." },
            { id: 37, title: "Google Gemini", category: "כלי גוגל", driveUrl: "https://drive.google.com/file/d/1Jkq0NO9GQ2IgdfiWsdDPFv_ctPCoOfeh/view?usp=drive_link", siteUrl: "https://gemini.google.com", description: "עוזר בינה מלאכותית (AI) רב-תחומי ליצירת תוכן ומחקר.", info: "• ניהול שיחות אינטליגנטיות לסיעור מוחות פדגוגי.\n• כתיבת טקסטים, מיילים ומערכי שיעור במגוון סגנונות.\n• סיכום מסמכים וניתוח נתונים מטבלאות." },
            { id: 40, title: "Nano Banana", category: "כלי גוגל", driveUrl: "https://drive.google.com/file/d/1qaGQFcsYv12G32TNnCrdTmsuQuakLQ1U/view?usp=drive_link", siteUrl: "https://gemini.google.com", description: "המודל המתקדם של גוגל ליצירת תמונות מרהיבות מטקסט.", info: "• יצירת איורים ותמונות ריאליסטיות על בסיס תיאור מילולי.\n• התאמת סגנון אמנותי (ציור, צילום, פופ-ארט ועוד).\n• המחשת מושגים מופשטים בצורה ויזואלית מהירה." },
            { id: 41, title: "Google Gems", category: "כלי גוגל", driveUrl: "https://drive.google.com/file/d/1Jkq0NO9GQ2IgdfiWsdDPFv_ctPCoOfeh/view?usp=drive_link", siteUrl: "https://gemini.google.com/gems", description: "בניית מומחי AI מותאמים אישית לצרכים פדגוגיים ספציפיים.", info: "• יצירת עוזרי הוראה מותאמים אישית לנושאי לימוד.\n• הגדרת הנחיות קבועות ל-AI לדיוק התשובות.\n• שיתוף ה-Gems עם משתמשים אחרים בארגון." },
            { id: 42, title: "Google Earth", category: "כלי גוגל", driveUrl: "https://drive.google.com/file/d/1eNzEVxvUDarurT1q1Op0zSSZLTmBQ2Fe/view?usp=drive_link", siteUrl: "https://earth.google.com", description: "חקר העולם בתלת-ממד, סיורים וירטואליים ומפות היסטוריות.", info: "• חקר גיאוגרפי בתלת-ממד של כל נקודה בגלובוס.\n• שימוש ב-Voyager לסיורים לימודיים מובנים.\n• צפייה בשינויים בזמן (Timelapse) להבנת תהליכים סביבתיים." },
            { id: 38, title: "Google Vids", category: "כלי גוגל", driveUrl: "https://drive.google.com/file/d/18OTH4Y6Q5S59IR2pZciMtWMEEO2UCv1g/view?usp=drive_link", siteUrl: "https://vids.google.com", description: "אפליקציה ליצירת סרטוני עבודה והדרכה מבוססת בינה מלאכותית.", info: "• יצירת סטוריבורד ותסריט לסרטון בעזרת AI.\n• עריכת וידאו פשוטה המבוססת על שקפים ותבניות.\n• שיתוף סרטונים עם הכיתה בצורה מאובטחת." },
            { id: 39, title: "NotebookLM", category: "כלי גוגל", driveUrl: "https://drive.google.com/file/d/1rugVVLRSUFbrk--CjkZOraXCWlzalPb3/view?usp=drive_link", siteUrl: "https://notebooklm.google.com", description: "עוזר מחקר אישי מבוסס AI המשתמש במסמכים שלכם כמקור ידע.", info: "• העלאת קבצי PDF ליצירת בסיס ידע פרטי וממוקד.\n• שאילת שאלות על החומר המבוססות על המקורות שהעליתם.\n• הפקת פודקאסט שמע המנתח את תוכן המסמכים." },
            { id: 27, title: "אורט קמפוס", category: "אינטראקטיביות", driveUrl: "", siteUrl: "https://campus.ort.org.il/", description: "הקמפוס הווירטואלי של רשת אורט. פלטפורמה לניהול למידה.", info: "• גישה לקורסים דיגיטליים מובנים במגוון מקצועות.\n• ניהול משימות והגשות עבור תלמידים.\n• מעקב אחר התקדמות הלמידה וציונים." },
            { id: 3, title: "Mentimeter", category: "שיתופיות", driveUrl: "https://drive.google.com/file/d/1ocybR8PcGro2Ue6GyS4a8FgwhDWB9Gzx/view?usp=sharing", siteUrl: "https://www.mentimeter.com", description: "מצגות אינטראקטיביות לשיתוף קהל וקבלת משוב חי במגוון סקרים.", info: "• יצירת ענני מילים המבוססים על תשובות התלמידים.\n• עריכת סקרים ובחנים מהירים בזמן אמת.\n• פלטפורמה לשאלות ותשובות אנונימיות מהכיתה." },

            { id: 18, title: "Photopea", category: "עיצוב ויצירה", driveUrl: "", siteUrl: "https://www.photopea.com", description: "עורך תמונות מקצועי וחינמי בדפדפן, תואם פוטושופ.", info: "• עריכת תמונות מתקדמת בשכבות.\n• תמיכה מלאה בקבצי PSD ו-AI.\n• כלי מעולה ללימודי אמנות דיגיטלית ללא התקנה." },
            { id: 33, title: "Figma", category: "עיצוב ויצירה", driveUrl: "", siteUrl: "https://www.figma.com", description: "פלטפורמה מקצועית לעיצוב ממשקים (UI/UX) ושיתוף פעולה ויזואלי.", info: "• עיצוב אבות-טיפוס של אפליקציות ואתרים.\n• עבודה שיתופית בזמן אמת על אותו מסך.\n• שימוש ב-FigJam כלוח לבן לסיעור מוחות." },
            { id: 31, title: "Tinkercad", category: "עיצוב ויצירה", driveUrl: "https://drive.google.com/file/d/1ZbsYfD5GEP298ccEJWdb3UdsPKDGjsyD/view?usp=sharing", siteUrl: "https://www.tinkercad.com", description: "פלטפורמה לתכנון בתלת-ממד ועיצוב מעגלים אלקטרוניים.", info: "• בניית מודלים תלת-ממדיים להדפסת תלת-ממד.\n• תכנון וסימולציה של מעגלים אלקטרוניים וארדואינו.\n• לימוד פיזיקה וחשמל דרך הדמיות אינטראקטיביות." },
            { id: 6, title: "Genially", category: "אינטראקטיביות", driveUrl: "https://drive.google.com/file/d/11lWrpl9ZwvyuED-13lEyh06SIAOHTaAx/view?usp=sharing", siteUrl: "https://genial.ly", description: "יצירת מצגות, משחקים ואינפוגרפיקות אינטראקטיביות.", info: "• בניית חדרי בריחה דיגיטליים (Escape Rooms).\n• יצירת אינפוגרפיקות הכוללות אלמנטים מונפשים.\n• שימוש בתבניות גיימיפיקציה להפיכת מבחנים למשחקים." },
            { id: 5, title: "Kahoot!", category: "משחקים", driveUrl: "https://drive.google.com/file/d/1v5jVMrb3jEtjNpRVX7Qs8eDKrtb5zij8/view?usp=sharing", siteUrl: "https://kahoot.com", description: "הפוך למידה למשחק דרך חידונים תחרותיים.", info: "• יצירת חידונים מהירים לבדיקת ידע בסגנון 'טריוויה'.\n• ניהול תחרויות כיתתיות המבוססות על מהירות ודיוק.\n• קבלת דוחות מפורטים על רמת השליטה של התלמידים." },
            { id: 13, title: "Quizizz", category: "משחקים", driveUrl: "", siteUrl: "https://quizizz.com", description: "חידונים בקצב אישי הכוללים דוחות התקדמות וממים משעשעים.", info: "• מתן אפשרות לתלמידים לענות על השאלות בקצב האישי.\n• שילוב ממים והומור בתוך החידון להגברת ההנאה.\n• אינטגרציה מלאה עם Google Classroom." },
            { id: 16, title: "Baamboozle", category: "משחקים", driveUrl: "", siteUrl: "https://www.baamboozle.com", description: "משחקי צוותים ללא צורך במכשירים אישיים, מושלם לחימום כיתתי.", info: "• הפעלת כל הכיתה ללא צורך שלתלמידים יהיו טלפונים.\n• חלוקת הכיתה לצוותים שמתחרים זה בזה דרך מסך אחד.\n• כלי אידיאלי לפעילויות פתיחת שיעור או סיכום." },
            { id: 17, title: "Nearpod", category: "משחקים", driveUrl: "", siteUrl: "https://nearpod.com", description: "שיעורים אינטראקטיביים המשלבת מצגות, משחקים ומציאות מדומה.", info: "• שליטה של המורה על קצב העברת השקפים.\n• הוספת פעילויות בתוך המצגת: ציור, שאלות פתוחות.\n• צפייה בסיורים וירטואליים ומודלים תלת-ממדיים." },
            { id: 20, title: "Flippity", category: "משחקים", driveUrl: "", siteUrl: "https://www.flippity.net", description: "הפוך גליונות גוגל למשחקים כמו גלגלי מזל וחדרי בריחה.", info: "• המרת גליונות נתונים (Google Sheets) למגוון משחקים.\n• יצירת גלגל מזל לבחירת תלמידים.\n• הכנת כרטיסיות זיכרון ללימוד מושגים." },
            { id: 10, title: "Wordwall", category: "משחקים", driveUrl: "", siteUrl: "https://wordwall.net", description: "יצירת פעילויות מותאמות אישית במגוון תבניות משחק.", info: "• יצירת משחקים כמו התאמת זוגות, מבוך, וגלגל מזל.\n• המרת כל פעילות למספר תבניות שונות בלחיצת כפתור.\n• מעקב אחר ביצועי תלמידים דרך לוח תוצאות." },
            { id: 11, title: "Classroomscreen", category: "כלים שעושים חיים קלים", driveUrl: "https://drive.google.com/file/d/1pJDqx_K1ZKV-bEtRGHj6Sx8YUgcwuwC6/view?usp=sharing", siteUrl: "https://classroomscreen.com", description: "ניהול מסך הכיתה עם כלים כמו טיימר, רמות רעש וקודי QR.", info: "• הצגת טיימר ושעון חול לניהול זמן המשימות בכיתה.\n• שימוש במד רעש המגיב לדיבור של התלמידים.\n• כתיבת הנחיות לשימוש ב'שפת סימנים' (עבודה שקטה)." },
            { id: 32, title: "Classe", category: "שיתופיות", driveUrl: "https://drive.google.com/file/d/1-A4JjSMc5G3XhFszhUiPaEdp7V0P7UZh/view?usp=sharing", siteUrl: "https://www.classe.world", description: "מערכת לניהול כיתה חכם, הכוללת מפות הושבה וניהול למידה.", info: "• בניית מפת הושבה דינמית המותאמת לצרכי התלמידים.\n• חלוקת הכיתה לקבוצות עבודה באופן אוטומטי.\n• תיעוד התנהגות והשתתפות תלמידים במהלך השיעור." },
            { id: 7, title: "remove.bg", category: "כלים שעושים חיים קלים", driveUrl: "", siteUrl: "https://www.remove.bg", description: "הסרת רקע מתמונות בתוך שניות בעזרת בינה מלאכותית.", info: "• הסרה מיידית של הרקע מכל תמונה ללא צורך בידע גרפי.\n• יצירת תמונות שקופות (PNG) לשימוש במצגות וכרזות.\n• חיסכון משמעותי בזמן בהכנת חומרי למידה מעוצבים." },
            { id: 8, title: "iLovePDF", category: "כלים שעושים חיים קלים", driveUrl: "https://drive.google.com/file/d/1KOA268-vL0hoBkxBhtFtyqWitg5Oz5kY/view?usp=sharing", siteUrl: "https://www.ilovepdf.com", description: "סט כלים לניהול, המרה ועריכת קבצי PDF בקלות.", info: "• מיזוג מספר קבצי PDF לקובץ אחד.\n• פיצול קובץ PDF גדול למספר קבצים נפרדים.\n• המרת קבצי Word ו-PowerPoint ל-PDF ולהיפך." },
            { id: 28, title: "123Apps", category: "כלים שעושים חיים קלים", driveUrl: "", siteUrl: "https://123apps.com/", description: "סט כלים מקוון לעריכת וידאו, אודיו וניהול PDF.", info: "• חיתוך, סיבוב ושינוי גודל של סרטוני וידאו.\n• המרת קבצי אודיו בין פורמטים שונים.\n• הקלטת מסך או הקלטת קול ישירות מהדפדפן." },
            { id: 30, title: "TinyWow", category: "כלים שעושים חיים קלים", driveUrl: "", siteUrl: "https://tinywow.com/", description: "מאות כלים חינמיים לטיפול בקבצים, תמונות, וידאו וכתיבה.", info: "• כלי בינה מלאכותית לכתיבת טקסטים או שיפורם.\n• הסרת אלמנטים לא רצויים מתמונות.\n• חילוץ טקסט מתוך תמונה (OCR)." },
            { id: 9, title: "Pixabay", category: "מאגרי מדיה", driveUrl: "", siteUrl: "https://pixabay.com", description: "מאגר תמונות וסרטונים לשימוש חופשי ללא זכויות יוצרים.", info: "• גישה למיליוני תמונות, איורים ווקטורים באיכות גבוהה.\n• הורדת סרטוני וידאו ומוזיקת רקע ללא חשש מזכויות יוצרים.\n• שימוש חופשי לצרכי חינוך ומצגות." },
            { id: 12, title: "Unsplash", category: "מאגרי מדיה", driveUrl: "", siteUrl: "https://unsplash.com", description: "מאגר צילומים אמנותיים ואיכותיים ברזולוציה גבוהה.", info: "• מציאת צילומי אווירה ונופים ברמה המקצועית הגבוהה ביותר.\n• שדרוג הנראות הוויזואלית של מצגות פרויקטים.\n• תמונות המתאימות כרקעים למחשב או למצגת." }
        ];

        const grid = document.getElementById('presentationsGrid');
        const desktopFilterBar = document.getElementById('desktopFilterBar');
        const mobileDropdownList = document.getElementById('mobileDropdownList');
        const currentCategoryLabel = document.getElementById('currentCategoryLabel');
        const searchInput = document.getElementById('searchInput');
        const totalBadge = document.getElementById('totalToolsBadge');
        
        let activeCategory = 'הכל';
        let searchQuery = '';

        const categoryStyles = {
            'שיתופיות': { color: '#22d3ee' },
            'אינטראקטיביות': { color: '#10b981' },
            'עיצוב ויצירה': { color: '#f43f5e' },
            'משחקים': { color: '#6366f1' },
            'כלים שעושים חיים קלים': { color: '#f59e0b' },
            'מאגרי מדיה': { color: '#d946ef' },
            'כלי גוגל': { color: '#8b5cf6' },
            'default': { color: '#3b82f6' }
        };

        function hexToRgba(hex, opacity) {
            let r = 0, g = 0, b = 0;
            if (hex.length == 4) {
                r = "0x" + hex[1] + hex[1]; g = "0x" + hex[2] + hex[2]; b = "0x" + hex[3] + hex[3];
            } else if (hex.length == 7) {
                r = "0x" + hex[1] + hex[2]; g = "0x" + hex[3] + hex[4]; b = "0x" + hex[5] + hex[6];
            }
            return `rgba(${+r}, ${+g}, ${+b}, ${opacity})`;
        }

        function toggleMobileDropdown() {
            const list = document.getElementById('mobileDropdownList');
            const isVisible = list.style.display === 'flex';
            list.style.display = isVisible ? 'none' : 'flex';
        }

        function renderFilters() {
            const categories = Object.keys(categoryMap);
            
            // Desktop Filter Bar
            desktopFilterBar.innerHTML = categories.map(cat => {
                const isActive = activeCategory === cat;
                const style = categoryStyles[cat] || categoryStyles['default'];
                return `<button onclick="setFilter('${cat}')" class="filter-btn ${isActive ? 'active-filter' : ''}" style="--hover-color: ${style.color}; ${isActive ? `border-color: ${style.color}; box-shadow: 0 0 15px ${style.color};` : ''}">
                    <span class="category-num-badge" style="background: ${style.color}">${categoryMap[cat]}</span>
                    ${cat} <span class="mr-1 opacity-60 text-[0.7rem]">(${presentations.filter(p => p.category === cat).length})</span>
                </button>`;
            }).join('');

            // Mobile Dropdown List
            mobileDropdownList.innerHTML = `<div onclick="setFilter('הכל')" class="mobile-dropdown-item ${activeCategory === 'הכל' ? 'active' : ''}">הצג את כל הקטגוריות</div>` + 
            categories.map(cat => {
                const isActive = activeCategory === cat;
                const style = categoryStyles[cat] || categoryStyles['default'];
                return `<div onclick="setFilter('${cat}')" class="mobile-dropdown-item ${isActive ? 'active' : ''}" style="border-right: 4px solid ${style.color}">
                    <span class="category-num-badge" style="background: ${style.color}">${categoryMap[cat]}</span>
                    ${cat}
                </div>`;
            }).join('');

            currentCategoryLabel.innerText = activeCategory === 'הכל' ? 'כל הקטגוריות' : activeCategory;
            totalBadge.innerText = presentations.length;
        }

        function setFilter(category) { 
            activeCategory = activeCategory === category ? 'הכל' : category; 
            document.getElementById('mobileDropdownList').style.display = 'none'; 
            renderFilters(); 
            renderPresentations(); 
        }

        function handleSearch() { searchQuery = searchInput.value.toLowerCase().trim(); renderPresentations(); }

        function renderPresentations() {
            let filtered = activeCategory === 'הכל' ? presentations : presentations.filter(p => p.category === activeCategory);
            if (searchQuery) filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery) || p.description.toLowerCase().includes(searchQuery));
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-500">לא נמצאו כלים תואמים לחיפוש...</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const style = categoryStyles[p.category] || categoryStyles['default'];
                const catNum = categoryMap[p.category] || 0;
                const darkerCenter = hexToRgba(style.color, 0.9).replace(/rgba\((\d+),\s*(\d+),\s*(\d+),/, (m, r, g, b) => `rgba(${Math.floor(r/6)}, ${Math.floor(g/6)}, ${Math.floor(b/6)},`);
                const lightEdge = hexToRgba(style.color, 0.45);
                
                return `
                <div class="card-3d p-8 flex flex-col justify-between" style="--category-color: ${style.color}; --category-glow: ${style.color}40; --card-gradient-center: ${darkerCenter}; --card-gradient-edge: ${lightEdge};">
                    <div>
                        <div class="category-chip" style="border-right-color: ${style.color};">
                            <span class="category-num-badge" style="background: ${style.color}; margin-left: 10px;">${catNum}</span>
                            ${p.category}
                        </div>
                        <h3 class="text-2xl font-bold mb-4 text-white">${p.title}</h3>
                        <p class="text-white/90 text-base mb-10 leading-relaxed">${p.description}</p>
                    </div>
                    <div class="flex flex-col gap-4">
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="openModal(${p.id})" class="yellow-action-btn py-3 px-2 font-bold text-xs text-center">מידע ושימושים</button>
                            <a href="${p.siteUrl}" target="_blank" class="yellow-action-btn py-3 px-2 font-bold text-xs text-center flex items-center justify-center">כניסה לאתר</a>
                        </div>
                        ${p.guideUrl ? `<a href="${p.guideUrl}" target="_blank" class="py-3 px-4 font-bold text-center text-xs tracking-wider border border-orange-300/50 transition-all" style="border-radius: var(--radius-round) var(--radius-soft-square) var(--radius-round) var(--radius-soft-square) !important; color: var(--light-orange); border-color: var(--light-orange);">מדריך לקבלת חשבון חינוך</a>` : ''}
                        ${p.driveUrl ? `<a href="${p.driveUrl}" target="_blank" class="bg-orange-600 hover:bg-orange-500 text-white py-3 px-4 text-center text-xs transition-all font-black uppercase shadow-[0_0_15px_rgba(249,115,22,0.4)]" style="border-radius: var(--radius-round) var(--radius-soft-square) var(--radius-round) var(--radius-soft-square) !important; background-color: var(--accent-orange);">צפייה במצגת ההדרכה</a>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function openModal(id) { 
            const p = presentations.find(item => item.id === id); 
            document.getElementById('modalTitle').innerText = p.title;
            document.getElementById('modalBody').innerText = p.info; 
            document.getElementById('infoModal').style.display = 'flex'; 
        }
        
        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('infoModal')) closeModal(); }

        renderFilters();
        renderPresentations();
    </script>
</body>
</html>
