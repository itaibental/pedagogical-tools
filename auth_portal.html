<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה לארגז הכלים - אורט שחקים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-orange: #fb923c;
            --accent-yellow: #facc15;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, rgba(251, 146, 60, 0.05) 0%, transparent 80%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid rgba(251, 146, 60, 0.3);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 8px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .google-btn {
            background: white;
            color: #374151;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            transition: all 0.3s ease;
            border: 1px solid #d1d5db;
        }

        .google-btn:hover:not(:disabled) {
            background: #f9fafb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .admin-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(251, 146, 60, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            width: 120px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .admin-input:focus {
            border-color: var(--accent-orange);
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }

        .loading-spinner {
            border: 3px solid rgba(251, 146, 60, 0.1);
            border-top: 3px solid var(--accent-orange);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }

        /* Welcome Overlay */
        #welcomeOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="text-3xl font-bold mb-2 text-white uppercase italic tracking-wider">שחקים TOOLBOX</h1>
        <p class="text-slate-400 mb-8">המערכת מיועדת לצוות אורט שחקים בלבד</p>
        
        <div id="errorMessage" class="error-box text-right"></div>

        <button id="loginBtn" class="google-btn">
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.173.282-1.712V4.956H.957C.347 6.173 0 7.548 0 9s.347 2.827.957 4.044l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.582C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.956L3.964 7.288c.708-2.127 2.692-3.708 5.036-3.708z"/></svg>
            התחברות עם חשבון גוגל
        </button>

        <!-- Admin Bypass Section -->
        <div class="admin-section">
            <p class="text-xs text-slate-500 mb-3">כניסת מנהל (מעקף קוד)</p>
            <div class="flex gap-2 justify-center items-center">
                <input type="password" id="adminCode" class="admin-input" placeholder="קוד">
                <button id="adminLoginBtn" class="bg-orange-600/20 hover:bg-orange-600 text-orange-400 hover:text-white border border-orange-600/50 px-4 py-2 rounded text-sm transition-all">כניסה</button>
            </div>
        </div>

        <div class="mt-4 flex justify-center">
            <div id="loader" class="loading-spinner"></div>
        </div>
    </div>

    <!-- Welcome Message Modal -->
    <div id="welcomeOverlay">
        <h2 id="welcomeName" class="text-4xl font-bold text-white mb-4">שלום</h2>
        <p class="text-orange-400 text-xl">מיד תועבר לארגז הכלים...</p>
        <div class="mt-8 loading-spinner" style="display: block;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuo4N-w-5JFu2pLwmNmPrnuB56q0-9Ikc",
            authDomain: "pedagogical-tools.firebaseapp.com",
            projectId: "pedagogical-tools",
            storageBucket: "pedagogical-tools.firebasestorage.app",
            messagingSenderId: "439078826304",
            appId: "1:439078826304:web:182cbafb97abab137a4aa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const ALLOWED_DOMAIN = "sn.ort.org.il";
        const appId = "pedagogical-tools";

        const loginBtn = document.getElementById('loginBtn');
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        const adminCodeInput = document.getElementById('adminCode');
        const errorMessage = document.getElementById('errorMessage');
        const loader = document.getElementById('loader');
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const welcomeName = document.getElementById('welcomeName');

        adminLoginBtn.addEventListener('click', () => {
            if (adminCodeInput.value === '1234') {
                showGreeting("מנהל מערכת");
            } else {
                showError("קוד שגוי. נסה שוב.");
            }
        });

        async function logVisit(user) {
            try {
                const logRef = collection(db, 'artifacts', appId, 'public', 'data', 'user_logins');
                await addDoc(logRef, {
                    name: user.displayName || 'Anonymous Admin',
                    email: user.email || 'Admin Bypass',
                    timestamp: serverTimestamp(),
                    uid: user.uid
                });
            } catch (e) {
                console.error("Firestore Log Error:", e);
            }
        }

        function showGreeting(name) {
            welcomeName.innerText = `שלום ${name}`;
            welcomeOverlay.style.display = 'flex';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }

        async function handleLogin() {
            errorMessage.style.display = 'none';
            loginBtn.disabled = true;
            loader.style.display = 'block';

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                if (user.email && (user.email.endsWith(`@${ALLOWED_DOMAIN}`) || user.email === "itaybt@gmail.com")) {
                    await logVisit(user);
                    showGreeting(user.displayName || "משתמש");
                } else {
                    showError(`גישה נדחתה. עליך להתחבר עם חשבון ${ALLOWED_DOMAIN} בלבד.`);
                    await signOut(auth);
                    resetUI();
                }
            } catch (error) {
                console.error("Auth Error:", error);
                // הצגת קוד השגיאה המדויק למשתמש לצורך דיבאג
                let msg = "התחברות נכשלה.";
                if (error.code === 'auth/unauthorized-domain') {
                    msg = "שגיאה: הדומיין אינו מורשה ב-Firebase Console.";
                } else if (error.code === 'auth/popup-closed-by-user') {
                    msg = "החלון נסגר לפני השלמת ההתחברות.";
                } else {
                    msg += ` (קוד: ${error.code})`;
                }
                showError(msg);
                resetUI();
            }
        }

        function resetUI() {
            loginBtn.disabled = false;
            loader.style.display = 'none';
        }

        function showError(msg) {
            errorMessage.innerHTML = msg;
            errorMessage.style.display = 'block';
        }

        loginBtn.addEventListener('click', handleLogin);
    </script>
</body>
</html>
