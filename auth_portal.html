<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה לארגז הכלים - אורט שחקים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-orange: #fb923c;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, rgba(251, 146, 60, 0.05) 0%, transparent 80%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid rgba(251, 146, 60, 0.3);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 8px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .google-btn {
            background: white;
            color: #374151;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            transition: all 0.3s ease;
            border: 1px solid #d1d5db;
        }

        .google-btn:hover:not(:disabled) {
            background: #f9fafb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }

        .loading-spinner {
            border: 3px solid rgba(251, 146, 60, 0.1);
            border-top: 3px solid var(--accent-orange);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="text-3xl font-bold mb-2 text-white uppercase italic tracking-wider">שחקים TOOLBOX</h1>
        <p class="text-slate-400 mb-8">המערכת מיועדת לצוות אורט שחקים בלבד</p>
        
        <div id="errorMessage" class="error-box text-right"></div>

        <button id="loginBtn" class="google-btn">
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.173.282-1.712V4.956H.957C.347 6.173 0 7.548 0 9s.347 2.827.957 4.044l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.582C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.956L3.964 7.288c.708-2.127 2.692-3.708 5.036-3.708z"/></svg>
            התחברות עם חשבון גוגל
        </button>

        <div class="mt-4 flex justify-center">
            <div id="loader" class="loading-spinner"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, signInWithCustomToken, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const ALLOWED_DOMAIN = "sn.ort.org.il";

        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const loader = document.getElementById('loader');

        // Handle initial auth for preview environment
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.isAnonymous || (user.email && user.email.endsWith(`@${ALLOWED_DOMAIN}`))) {
                    window.location.href = 'index.html';
                } else if (user.email) {
                    showError(`גישה נדחתה. עליך להתחבר עם חשבון <b>${ALLOWED_DOMAIN}</b> בלבד.`);
                    signOut(auth);
                }
            }
        });

        async function handleLogin() {
            errorMessage.style.display = 'none';
            loginBtn.disabled = true;
            loader.style.display = 'block';

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                if (user.email && !user.email.endsWith(`@${ALLOWED_DOMAIN}`)) {
                    showError("החשבון אינו מורשה. השתמש בדומיין הבית ספרי.");
                    await signOut(auth);
                }
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/unauthorized-domain') {
                    showError("שגיאה: הדומיין אינו מורשה ב-Firebase Console.");
                } else {
                    showError("התחברות נכשלה.");
                }
                loginBtn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function showError(msg) {
            errorMessage.innerHTML = msg;
            errorMessage.style.display = 'block';
        }

        loginBtn.addEventListener('click', handleLogin);
    </script>
</body>
</html>
